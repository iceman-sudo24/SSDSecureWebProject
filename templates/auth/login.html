{% extends "base.html" %}

{% block title %}Login - Secure Inventory System{% endblock %}

{% block content %}
<div class="auth-container">
    <h1>Login</h1>
    <form method="post" action="{% url 'auth_service:login' %}" class="auth-form">
        {% csrf_token %}
        <div class="form-group">
            <label for="username">Username</label>
            <input type="text" id="username" name="username" required
                   maxlength="30" pattern="[a-zA-Z][a-zA-Z0-9_-]{2,29}"
                   title="3-30 characters, start with a letter"
                   autocomplete="username">
        </div>
        <div class="form-group">
            <label for="password">Password</label>
            <input type="password" id="password" name="password" required
                   minlength="12" autocomplete="current-password">
        </div>
        <button type="submit" class="btn btn-primary">Login</button>
    </form>
    <p class="auth-link">Don't have an account? <a href="{% url 'auth_service:register' %}">Register here</a></p>
</div>
{% endblock %}
